# ============================================================
# .github/workflows/daily_blog.yml
# 매일 오전 7시 (KST = UTC+9 → UTC 22:00 전날) 자동 실행
# ============================================================
name: 🤖 Daily Blog Auto-Update

on:
  workflow_dispatch:          # 수동 트리거 (테스트용)
    inputs:
      force_regenerate:
        description: '기존 포스트 강제 재생성'
        required: false
        default: 'false'

concurrency:
  group: auto-content-main
  cancel-in-progress: false

# 저장소에 쓸 권한 필요
permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Python 파이프라인 (데이터 수집 → AI 글 생성 → SEO)
  # ──────────────────────────────────────────────────────────
  generate-content:
    name: 📝 콘텐츠 생성
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Python 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 🚀 자동화 파이프라인 실행
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MYREALTRIP_REFERRER_ID: ${{ secrets.MYREALTRIP_REFERRER_ID }}
          MRT_PARTNER_ID: ${{ secrets.MRT_PARTNER_ID }}
          GITHUB_PAGES_BASE_URL: https://k-festa.nextfintechai.com
        run: python scripts/pipeline.py

      - name: 생성 결과 검증
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('assets/posts/raw_festivals.json')
          data = json.loads(path.read_text(encoding='utf-8')) if path.exists() else []
          print(f'raw_festivals_count={len(data)}')
          if not data:
              raise SystemExit('raw_festivals.json is empty')
          PY

      # 변경된 파일을 임시 저장 (다음 Job에서 사용)
      - name: 생성된 파일 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: generated-posts
          path: |
            assets/posts/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 2: Flutter Web 빌드 & GitHub Pages 배포
  # ──────────────────────────────────────────────────────────
  build-and-deploy:
    name: 🏗️ Flutter 빌드 & 배포
    runs-on: ubuntu-latest
    needs: generate-content

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 생성된 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          name: generated-posts
          path: assets/posts/

      - name: Flutter SDK 설정
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter 의존성 설치
        run: flutter pub get

      - name: SEO 메타 태그 반영
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install -r scripts/requirements.txt -q
          python scripts/update_seo_meta.py

      - name: Flutter Web 빌드
        run: |
          flutter build web \
            --release \
            --base-href "/"

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          cname: k-festa.nextfintechai.com
          publish_branch: gh-pages
          commit_message: '🤖 Auto-deploy: ${{ github.run_number }} [${{ github.sha }}]'
          force_orphan: false

  # ──────────────────────────────────────────────────────────
  # JOB 3: 소스 저장소에 생성된 포스트 커밋
  # ──────────────────────────────────────────────────────────
  commit-posts:
    name: 💾 포스트 커밋
    runs-on: ubuntu-latest
    needs: generate-content

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 생성된 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          name: generated-posts
          path: assets/posts/

      - name: Git 커밋 & 푸시
        run: |
          set -e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/posts/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🎉 자동 포스트 업데이트 $(date '+%Y-%m-%d')"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
