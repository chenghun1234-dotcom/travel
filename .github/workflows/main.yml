name: Auto-Content-Update

on:
  schedule:
    - cron: '0 21 * * *' # 한국 시간 기준 매일 오전 6시 실행 (UTC 21:00)
  workflow_dispatch:      # 수동으로 실행하고 싶을 때 사용

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests google-generativeai

      - name: Run Content Generator
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MRT_PARTNER_ID: ${{ secrets.MRT_PARTNER_ID }}
        run: python scripts/update_festivals.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/festivals.json
          git commit -m "chore: daily festival update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push