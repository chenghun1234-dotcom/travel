name: Auto-Content & Deploy to Pages

on:
  schedule:
    - cron: '0 21 * * *' 
  workflow_dispatch:      

concurrency:
  group: auto-content-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 저장소 체크아웃 (v3 -> v4 업데이트)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 2. Python 환경 설정 (v4 -> v5 업데이트)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install requests google-generativeai

      # 3. 데이터 수집 실행
      - name: Run Content Generator
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MRT_PARTNER_ID: ${{ secrets.MRT_PARTNER_ID }}
          GITHUB_PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          NAVER_SITE_VERIFICATION: ${{ secrets.NAVER_SITE_VERIFICATION }}
        run: python scripts/update_festivals.py

      # 4. 결과 커밋
      - name: Commit and Push
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/festivals.json assets/posts/ web/index.html web/sitemap.xml web/robots.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update festival data $(date +'%Y-%m-%d')"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      # 5. Flutter 빌드 및 배포
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --web-renderer canvaskit

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          # 커스텀 도메인 사용 시: CUSTOM_DOMAIN 시크릿에 도메인 입력 (예: www.내도메인.com)
          # 미설정 시 GitHub 기본 주소 사용 (chenghun1234-dotcom.github.io/travel)
          cname: ${{ secrets.CUSTOM_DOMAIN }}