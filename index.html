  <!-- Flutter ServiceWorker -->
  <script>
    const serviceWorkerVersion = "1232282430" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) return;
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var serviceWorkerUrl = 'flutter_service_worker.js?v=' + serviceWorkerVersion;
        navigator.serviceWorker.register(serviceWorkerUrl).then(function (reg) {
          function waitForActivation(serviceWorker) {
            serviceWorker.addEventListener('statechange', function () {
              if (serviceWorker.state == 'activated') {
                console.log('Installed new service worker.');
                loadMainDartJs();
              }
            });
          }
          if (!reg.active && (reg.installing || reg.waiting)) {
            waitForActivation(reg.installing || reg.waiting);
          } else if (!reg.active.scriptURL.endsWith(serviceWorkerVersion)) {
            console.log('New service worker available.');
            reg.update();
            waitForActivation(reg.installing);
          } else {
            console.log('Loading app from service worker.');
            loadMainDartJs();
          }
        });
        setTimeout(function () {
          if (!scriptLoaded) {
            console.log('Failed to load app from service worker. Trying to load directly.');
            loadMainDartJs();
          }
        }, 4000);
      });
    } else {
      window.addEventListener('load', function(ev) {
        loadMainDartJs();
      });
    }
  </script>

  <!-- Flutter가 로드되면 로딩 화면 숨기기 -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.3s ease';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 300);
      }
    });
